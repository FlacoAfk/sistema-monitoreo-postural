<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Spine silhouette -->
  <g transform="translate(256,60)" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head circle -->
    <circle cx="0" cy="20" r="36" fill="#ffffff" stroke="none"/>
    <!-- Neck to spine -->
    <path d="M0,56 L0,120 M0,120 L-20,160 M0,120 L20,160" stroke-width="14"/>
    <!-- Lumbar curve -->
    <path d="M-20,160 L-25,200 L-15,240 L0,280" stroke-width="16"/>
    <!-- Pelvis -->
    <path d="M0,280 L-30,310 M0,280 L30,310" stroke-width="14"/>
  </g>
  <!-- Pulse/heartbeat indicator -->
  <g transform="translate(256,420)" fill="none" stroke="#06b6d4" stroke-width="8" stroke-linecap="round">
    <path d="M-80,0 L-50,0 L-30,-30 L-10,20 L10,-20 L30,30 L50,0 L80,0"/>
  </g>
</svg>
