version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - POSTURE_WS_ENABLED=true
      - POSTURE_WS_URL=${POSTURE_WS_URL:-}
    expose:
      - "7860"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.posture-monitor.rule=Host(`posture.158-69-200-27.sslip.io`)"
      - "traefik.http.routers.posture-monitor.entrypoints=websecure"
      - "traefik.http.routers.posture-monitor.tls=true"
      - "traefik.http.routers.posture-monitor.tls.certresolver=letsencrypt"
      - "traefik.http.services.posture-monitor.loadbalancer.server.port=7860"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
