version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Required for mobile app: set to your Dockply public domain
      # e.g. POSTURE_WS_URL=wss://your-app.dockply.com/ws
      - POSTURE_WS_ENABLED=true
      - POSTURE_WS_URL=${POSTURE_WS_URL:-}
    networks:
      - internal
    # Ports NOT exposed directly — nginx is the single public entrypoint

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal
      - dokploy-network

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
